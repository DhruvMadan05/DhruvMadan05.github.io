<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Schibsted+Grotesk:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="site-header" class="site-header"></header>

  <main class="wrap">
    <section class="hero">
      <div class="hero-text">
        <p class="eyebrow" data-site-role></p>
        <h1 data-site-tagline></h1>
        <p class="lede" data-site-intro></p>
        <div class="btn-row">
          <a class="btn btn-primary" href="projects.html">View projects</a>
          <a class="btn btn-ghost" data-resume-link href="resume.pdf" download>Download resume</a>
        </div>
      </div>
      <!-- Set photo: "images/me.jpg" in data.js to use a real photo -->
      <div class="hero-photo hero-photo-placeholder" data-site-photo data-initials aria-hidden="true"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>Featured projects</h2>
        <a href="projects.html">See all →</a>
      </div>
      <div id="featured-grid" class="card-grid"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>Recent experience</h2>
        <a href="timeline.html">Full timeline →</a>
      </div>
      <div id="timeline-preview" class="timeline"></div>
    </section>
  </main>

  <dialog id="project-dialog" class="project-dialog"><div class="dialog-inner"></div></dialog>

  <footer id="site-footer" class="site-footer"></footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>

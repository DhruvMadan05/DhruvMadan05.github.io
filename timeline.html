<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeline — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Schibsted+Grotesk:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="site-header" class="site-header"></header>

  <main class="wrap">
    <p class="eyebrow">Timeline</p>
    <h1>Work &amp; education</h1>
    <p class="lede" style="margin-bottom: 28px;">Everything in one place, newest first. Filter by type below.</p>

    <div id="timeline-filters" class="filter-row" role="group" aria-label="Filter timeline">
      <button class="filter-btn" data-filter="all" aria-pressed="true">All</button>
      <button class="filter-btn" data-filter="work" aria-pressed="false">Work</button>
      <button class="filter-btn" data-filter="education" aria-pressed="false">Education</button>
    </div>

    <div id="timeline-full" class="timeline"></div>
  </main>

  <footer id="site-footer" class="site-footer"></footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Schibsted+Grotesk:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="site-header" class="site-header"></header>

  <main class="wrap">
    <div class="section-head" style="margin-bottom: 6px;">
      <div>
        <p class="eyebrow">Resume</p>
        <h1>Experience &amp; education</h1>
      </div>
      <a class="btn btn-primary" data-resume-link href="resume.pdf" download>Download PDF</a>
    </div>
    <div id="resume-details" hidden>
      <p class="lede">Work entries here come straight from the timeline data — add a job once and it appears in both places.</p>

      <section class="resume-section">
        <h2>Work experience</h2>
        <div id="resume-work"></div>
      </section>

      <section class="resume-section">
        <h2>Education</h2>
        <div id="resume-education"></div>
      </section>

      <section class="resume-section">
        <h2>Skills</h2>
        <div id="resume-skills" class="skill-groups"></div>
      </section>
    </div>

    <section class="resume-section">
      <h2>Full resume</h2>
      <div class="resume-embed-wrap">
        <iframe id="resume-embed" class="resume-embed" title="Resume PDF"></iframe>
      </div>
    </section>
  </main>

  <footer id="site-footer" class="site-footer"></footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      document.getElementById("resume-embed").src = SITE.resumeFile;
      if (SITE.showResumeDetails) {
        document.getElementById("resume-details").removeAttribute("hidden");
      }
    });
  </script>
</body>
</html>
